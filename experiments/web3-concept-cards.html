    def: "DeFi（Decentralized Finance，去中心化金融）是用智能合约替代传统金融中间人的模式。不需要银行或交易所托管资产，而是通过链上合约实现借贷、交易、理财等金融服务。所有代码开源、资产自托管、无需 KYC。典型应用：Uniswap（兑换）、Aave（借贷）、Compound（存币生息）。",
    example: "💡 DeFi vs CeFi（中心化金融，如 Binance）的核心区别：CeFi 信任平台，DeFi 信任代码。CeFi 速度快但可被审查/冻结，DeFi 无需许可但风险自担（合约漏洞、滑点、无常损失）。"
  },
  {
    topic: "tx-model", topicLabel: "🔄 交易模型",
    title: "Web2 vs Web3 交易模型",
    def: "Web2 交易是「客户端请求 → 服务器修改数据库 → 返回结果」。服务器管理员可以回滚、修改、删除任何记录。Web3 交易是「用户签名 → 广播到网络 → 节点验证共识 → 写入不可篡改的链」。一旦上链确认，没有人（包括合约作者）能单方面撤回或篡改。",
    example: "⚠️ Web3 交易不可逆是把双刃剑。用户付了 gas 但填错地址 → 钱拿不回来。合约有 bug 但已上链 → 只能通过新合约迁移。这是 Web3 把控制权从平台还给个人的代价：你负责，你承担。"
  }
];

let filtered = [...concepts];
let current = 0;
let mastered = new Set();

function renderCard(i) {
  if (filtered.length === 0) return;
  const c = filtered[i];
  document.getElementById('cardNum').textContent = `${i+1}/${filtered.length}`;
  document.getElementById('cardTitle').textContent = c.title;
  document.getElementById('topicTag').textContent = c.topicLabel;
  document.getElementById('backTitle').textContent = c.title;
  document.getElementById('backTopic').textContent = c.topicLabel;
  document.getElementById('backDef').textContent = c.def;
  document.getElementById('backExample').innerHTML = c.example;
  document.getElementById('currentIdx').textContent = i + 1;
  document.getElementById('totalCards').textContent = filtered.length;
  const pct = filtered.length > 0 ? (mastered.size / filtered.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('masteredCount').textContent = mastered.size;
  document.getElementById('cardContainer').classList.remove('flipped');
  // Reset container height
  document.getElementById('cardContainer').style.minHeight = '';
  // highlight mastered
  document.getElementById('masterBtn').textContent =
    mastered.has(c.title) ? '🔓 已掌握' : '✅ 标记掌握';
  document.getElementById('masterBtn').className =
    mastered.has(c.title) ? 'btn btn-success btn-sm' : 'btn btn-sm';
  document.getElementById('masterBtn').style.background =
    mastered.has(c.title) ? 'var(--success)' : 'var(--surface2)';
}

function applyFilter(filter) {
  if (filter === 'all') filtered = [...concepts];
  else filtered = concepts.filter(c => c.topic === filter);
  current = 0;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
  if (filtered.length === 0) {
    document.getElementById('cardTitle').textContent = '暂无卡片';
    document.getElementById('backDef').textContent = '当前分类没有概念卡片。请切换到其他分类。';
    document.getElementById('backExample').innerHTML = '';
    return;
  }
  renderCard(current);
}

// Event listeners
document.getElementById('cardContainer').addEventListener('click', () => {
  const container = document.getElementById('cardContainer');
  const back = document.getElementById('cardBack');
  container.classList.toggle('flipped');
  if (container.classList.contains('flipped')) {
    // Measure back content and expand container
    container.style.minHeight = Math.max(320, back.scrollHeight) + 'px';
  } else {
    container.style.minHeight = '';
  }
});

document.getElementById('nextBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (filtered.length === 0) return;
  current = (current + 1) % filtered.length;
  renderCard(current);
});

document.getElementById('prevBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (filtered.length === 0) return;
  current = (current - 1 + filtered.length) % filtered.length;
  renderCard(current);
});

document.getElementById('shuffleBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  current = 0;
  renderCard(current);
});

document.getElementById('masterBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (filtered.length === 0) return;
  const c = filtered[current];
  if (mastered.has(c.title)) mastered.delete(c.title);
  else mastered.add(c.title);
  renderCard(current);
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
});

// keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
  if (e.key === ' ') { e.preventDefault(); document.getElementById('cardContainer').classList.toggle('flipped'); }
  if (e.key === 'm' || e.key === 'M') document.getElementById('masterBtn').click();
});

renderCard(0);
</script>
</body>
</html>
